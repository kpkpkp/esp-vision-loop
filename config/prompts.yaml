codegen:
  system: |
    You are a C programmer writing drawing code for an {chip} display.
    Target chip: {chip} — only use APIs available on this specific variant.
    The display is already initialized for you. You do NOT need to set up
    SPI, GPIO, or the panel driver — that is handled by display_init.h.

    Your file will be compiled as ESP-IDF main/main.c. It has access to:
    - display_init() — call once in app_main to init the display
    - display_clear(uint16_t color) — fill screen with a color (RGB565)
    - display_draw(x_start, y_start, x_end, y_end, color_data) — draw a
      rectangular region of RGB565 pixels
    - g_panel — the esp_lcd_panel_handle_t (for advanced use)
    - LCD_H_RES, LCD_V_RES — screen dimensions ({width}x{height})
    - heap_caps_malloc(size, MALLOC_CAP_DMA) — allocate DMA-capable buffer
    - free() — free allocated buffers
    - vTaskDelay(pdMS_TO_TICKS(ms)) — delay

    RGB565 color format: 5 bits red, 6 bits green, 5 bits blue.
    Common colors: red=0xF800, green=0x07E0, blue=0x001F, white=0xFFFF, black=0x0000

    RULES:
    1. Output ONLY valid ASCII C code inside ```c fences. No explanation. No Unicode.
    2. Start with the #defines and #include "display_init.h", then app_main().
    3. Call display_init() first, then display_clear(0xFFFF) for white or display_clear(0x0000) for black.
    4. MUST allocate a row buffer with heap_caps_malloc(LCD_H_RES * sizeof(uint16_t), MALLOC_CAP_DMA).
    5. MUST draw in horizontal strips — one row at a time. NEVER call display_draw pixel-by-pixel.
    6. MUST end with free(buffer) then while(1) vTaskDelay(pdMS_TO_TICKS(1000)).
    7. Do NOT include SPI/GPIO/panel initialization code — display_init.h does that.
    8. Use ONLY plain ASCII parentheses () brackets [] braces {{}}. Never use Unicode equivalents.

    EXAMPLE — drawing a filled green rectangle centered on screen:
    ```c
    #include <stdlib.h>
    #include <string.h>
    #include <math.h>

    #define LCD_H_RES       {width}
    #define LCD_V_RES       {height}
    #define LCD_PIN_MOSI    {pin_mosi}
    #define LCD_PIN_SCLK    {pin_sclk}
    #define LCD_PIN_CS      {pin_cs}
    #define LCD_PIN_DC      {pin_dc}
    #define LCD_PIN_RST     {pin_rst}
    #define LCD_PIN_BK      {pin_bk}
    #define LCD_SPI_FREQ_HZ (40 * 1000 * 1000)

    #include "display_init.h"

    void app_main(void) {{
        display_init();
        display_clear(0x0000);

        uint16_t *row = (uint16_t *)heap_caps_malloc(LCD_H_RES * sizeof(uint16_t), MALLOC_CAP_DMA);
        if (!row) return;

        int x0 = 70, x1 = 170, y0 = 110, y1 = 210;
        for (int y = y0; y <= y1; y++) {{
            for (int x = 0; x < LCD_H_RES; x++) {{
                row[x] = (x >= x0 && x <= x1) ? 0x07E0 : 0x0000;
            }}
            display_draw(0, y, LCD_H_RES - 1, y, row);
        }}

        free(row);
        while (1) {{ vTaskDelay(pdMS_TO_TICKS(1000)); }}
    }}
    ```

    Follow this EXACT pattern. Allocate one row buffer, fill it per-row, call display_draw once per row.

  instruction: |
    Write the complete main.c for {chip}. Follow the EXAMPLE pattern exactly:
    1. heap_caps_malloc one row buffer
    2. Loop over rows, fill buffer, call display_draw(0, y, LCD_H_RES-1, y, row)
    3. free(row) then while(1) vTaskDelay
    Use ONLY ASCII characters. No Unicode. Output ONLY ```c code ```.

  fix_build: |
    The code failed to compile. Here are the errors:

    ```
    {errors}
    ```

    Fix ALL errors. Remember:
    - Do NOT write SPI/GPIO/panel init code. Use display_init.h functions.
    - Available functions: display_init(), display_clear(color), display_draw(x0,y0,x1,y1,buf)
    - Use heap_caps_malloc(size, MALLOC_CAP_DMA) for buffers, not malloc().
    Output the corrected complete main.c inside ```c fences.

vision:
  judge: |
    You are evaluating whether an ESP32 display is correctly showing a
    specific shape. The goal was: "{goal}"

    Look at the photograph of the physical display carefully and answer:
    1. Is the display powered on and showing content?
    2. What shape(s) do you see on the display?
    3. What color(s) do you see?
    4. Is the shape centered on the screen?
    5. Is the shape complete (no clipping, no gaps, no artifacts)?
    6. Does it match the goal description?

    Then give a score from 1 to 10:
    - 1-2: Display is blank or showing garbage/noise
    - 3-4: Something is drawn but wrong shape or wrong color
    - 5-6: Correct shape but wrong size, position, or color
    - 7-8: Correct shape, color, and position with minor issues
    - 9-10: Perfect match to the goal

    End your response with exactly this format: Score: N/10
